<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="dashboard-container">
        <h1>Global Weather Pinboard</h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Pin a city (e.g. Paris, Tokyo)...">
            <button id="searchBtn">Pin City</button>
        </div>

        <div id="errorMessage" class="error-hide"></div>

        <div id="weatherGrid" class="weather-grid"></div>
    </div>

    <script src="components/WeatherAPI.js"></script>
    <script src="components/Interface.js"></script>
    <script src="components/App.js"></script>
</body>
</html>
